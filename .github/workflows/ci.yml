name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      # Prisma needs this var present to read the schema during `generate`. No real DB is used —
      # the test suite is pure-domain — so a placeholder URL is enough.
      DATABASE_URL: postgresql://user:pass@localhost:5432/socialpulse

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root deps
        run: npm ci

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Backend typecheck
        run: npm run lint
        working-directory: backend

      - name: Backend tests (vitest)
        run: npm test
        working-directory: backend

      - name: Frontend typecheck & build
        run: npm run build
        working-directory: frontend
